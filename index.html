<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEION Mini App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center px-4">  <div class="w-full max-w-sm bg-zinc-900 border border-zinc-800 rounded-3xl shadow-2xl p-6 text-center"><!-- Header -->
<h1 class="text-4xl font-extrabold text-yellow-400 tracking-widest mb-6">
  LEION
</h1>

<!-- Telegram Username -->
<div class="bg-zinc-800 rounded-2xl py-4 px-4 mb-4">
  <p class="text-zinc-400 text-sm mb-1">Telegram Username</p>
  <h2 class="text-white text-xl font-bold">@username</h2>
</div>

<!-- Ads Count -->
<div class="bg-zinc-800 rounded-2xl py-4 px-4 mb-6">
  <p class="text-zinc-400 text-sm mb-1">Ads Watched</p>
  <h2 class="text-green-400 text-3xl font-extrabold">0</h2>
</div>

<!-- Watch Ads Button -->
<button class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-lg py-4 rounded-2xl transition duration-300 shadow-lg">
  Watch Ads
</button>

  </div></body>
</html>
